<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { background:#0a0e1a; color:#fff; font-family:sans-serif; padding:20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; max-width:600px; }
.card { background:#111827; border:1px solid #1e2d4a; border-radius:12px; padding:20px; text-align:center; }
.icon { font-size:32px; color:#00d4ff; margin-bottom:10px; }
.lbl { font-size:12px; color:#8899bb; font-family:monospace; }
</style>
</head><body>
<h2 style="color:#00d4ff">FontAwesome Chart Icons（深色底顯示效果）</h2>
<div class="grid">
<div class="card"><div class="icon"><i class="fa-solid fa-chart-bar"></i></div><div class="lbl">fa-chart-bar</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-pie"></i></div><div class="lbl">fa-chart-pie</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-line"></i></div><div class="lbl">fa-chart-line</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-area"></i></div><div class="lbl">fa-chart-area</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-column"></i></div><div class="lbl">fa-chart-column</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-simple"></i></div><div class="lbl">fa-chart-simple</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-gantt"></i></div><div class="lbl">fa-chart-gantt</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-table-columns"></i></div><div class="lbl">fa-table-columns</div></div>
</div>
<br>
<div class="grid">
<div class="card"><div class="icon"><i class="fa-solid fa-arrow-trend-up"></i></div><div class="lbl">arrow-up</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-arrow-trend-down"></i></div><div class="lbl">arrow-down</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-coins"></i></div><div class="lbl">coins</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-wallet"></i></div><div class="lbl">wallet</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-money-bill-trend-up"></i></div><div class="lbl">bill-up</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-database"></i></div><div class="lbl">database</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-layer-group"></i></div><div class="lbl">layers</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-mixed"></i></div><div class="lbl">mixed</div></div>
</div>
</body></html>
