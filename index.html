<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蝦助系統總入口</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Microsoft JhengHei',sans-serif;background:#f0f2f5;min-height:100vh;padding:20px}
h1{color:#1a1a2e;text-align:center;margin-bottom:30px;font-size:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;max-width:900px;margin:0 auto}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-decoration:none;color:inherit;transition:transform 0.2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.card h2{font-size:18px;margin-bottom:8px}
.card p{font-size:13px;color:#666}
.card.blue{border-left:4px solid #1976d2}
.card.green{border-left:4px solid #2e7d32}
.card.orange{border-left:4px solid #f57c00}
.card.purple{border-left:4px solid #7b1fa2}
.card.red{border-left:4px solid #c62828}
</style>
</head>
<body>
<h1>📌 蝦助系統總入口</h1>
<div class="grid">
<a class="card blue" href="https://pub-ad498842971c4801a54fabd88ffa4a7f.r2.dev/stock/">
<h2>📊 持股總攬</h2>
<p>台股 + 美股即時損益</p>
</a>
<a class="card green" href="https://pub-ad498842971c4801a54fabd88ffa4a7f.r2.dev/openclaw-status/">
<h2>🖥️ 系統狀態</h2>
<p>主機資源、天氣、發電效率</p>
</a>
<a class="card orange" href="https://pub-ad498842971c4801a54fabd88ffa4a7f.r2.dev/inventory/">
<h2>📦 庫存系統</h2>
<p>LINE 照片上傳庫存盤點</p>
</a>
<a class="card purple" href="https://pub-ad498842971c4801a54fabd88ffa4a7f.r2.dev/agri-weather/">
<h2>🌾 農業天氣</h2>
<p>農田氣象資訊</p>
</a>
<a class="card red" href="https://pub-ad498842971c4801a54fabd88ffa4a7f.r2.dev/electricity/">
<h2>⚡ 台電電費系統</h2>
<p>用電分析與帳單</p>
</a>
</div>
</body>
</html>
