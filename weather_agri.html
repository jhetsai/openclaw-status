<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 農業天氣 - 雲林水林</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: linear-gradient(135deg, #2d5016 0%, #4a7c23 50%, #6b8e23 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #1a3009 0%, #2d5016 100%); color: white; padding: 18px; border-radius: 14px; text-align: center; margin-bottom: 12px; }
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .header .source { font-size: 0.8em; opacity: 0.8; margin-top: 5px; }
        .section-title { color: white; font-size: 1em; margin-bottom: 8px; padding: 8px 15px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .section-title .badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 4px; font-size: 0.85em; }
        .alert { border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; display: flex; gap: 10px; align-items: center; }
        .alert.warning { background: #fff3cd; border: 2px solid #ffc107; }
        .alert.danger { background: #ffcdd2; border: 2px solid #f44336; }
        .alert.safe { background: #c8e6c9; border: 2px solid #4caf50; }
        .alert .icon { font-size: 1.5em; }
        .alert .text { flex: 1; }
        .alert .title { font-weight: bold; font-size: 0.95em; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .card h2, .card h3 { color: #2d5016; margin-bottom: 10px; font-size: 1em; }
        .card h2 .sub { font-size: 0.8em; color: #888; font-weight: normal; }
        .today-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .today-item { background: #f8f9fa; border-radius: 8px; padding: 10px 6px; text-align: center; }
        .today-item .icon { font-size: 1.3em; }
        .today-item .label { font-size: 0.75em; color: #666; }
        .today-item .value { font-size: 1.1em; font-weight: bold; color: #2d5016; }
        .today-item .value.danger { color: #d32f2f; }
        .today-item .value.warning { color: #f57c00; }
        .today-item .value.safe { color: #388e3c; }
        .rain-box { background: #e3f2fd; border-radius: 8px; padding: 10px; margin-top: 10px; }
        .rain-box h4 { color: #1976d2; font-size: 0.9em; margin-bottom: 8px; }
        .rain-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #bbdefb; font-size: 0.9em; }
        .rain-row:last-child { border-bottom: none; }
        .rain-row .time { font-weight: bold; color: #1976d2; min-width: 90px; }
        .rain-row .desc { flex: 1; color: #333; }
        .rain-row .level { font-weight: bold; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; }
        .rain-row .level.high { background: #ffcdd2; color: #c62828; }
        .rain-row .level.med { background: #fff3cd; color: #f57c00; }
        .rain-row .level.low { background: #c8e6c9; color: #2e7d32; }
        .rain-row .level.none { background: #eee; color: #888; }
        .chart-container { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .chart-container h3 { color: #2d5016; margin-bottom: 10px; font-size: 1em; }
        .day-card { background: white; border-radius: 10px; padding: 12px 15px; margin-bottom: 10px; }
        .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #eee; }
        .day-header .date { font-weight: bold; color: #333; min-width: 70px; }
        .day-header .date .day { font-size: 0.85em; color: #888; }
        .day-header .wx-icon { font-size: 2em; }
        .day-header .wx-desc { flex: 1; color: #333; }
        .day-header .temps { text-align: center; }
        .day-header .temps .high { font-size: 1.2em; font-weight: bold; color: #d32f2f; }
        .day-header .temps .low { font-size: 1em; color: #1976d2; }
        .period-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.9em; }
        .period-row:last-child { border-bottom: none; }
        .period-row .period { font-weight: bold; color: #1976d2; min-width: 55px; }
        .period-row .wx { font-size: 1.3em; min-width: 30px; text-align: center; }
        .period-row .desc { flex: 1; color: #333; }
        .period-row .level { font-weight: bold; padding: 2px 10px; border-radius: 4px; font-size: 0.85em; }
        .period-row .wind { font-weight: bold; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; background: #e3f2fd; color: #1976d2; }
        .period-row .wind.high { background: #ffcdd2; color: #c62828; }
        .period-row .wind.med { background: #fff3cd; color: #f57c00; }
        .period-row .wind.low { background: #c8e6c9; color: #2e7d32; }
        .tip-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .tip-item:last-child { border-bottom: none; }
        .tip-icon { font-size: 1.2em; }
        .tip-text .title { font-weight: bold; color: #333; }
        .tip-text .desc { color: #666; font-size: 0.9em; }
        .footer { text-align: center; padding: 12px; color: rgba(255,255,255,0.7); font-size: 0.75em; }
        @media (max-width: 600px) { .today-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 農業天氣服務</h1>
            <div>📍 雲林縣水林鄉</div>
            <div class="source">🔄 資料更新：<span id="update-time">載入中...</span></div>
        </div>
        
        <div class="alert warning" id="alert-box">
            <div class="icon" id="alert-icon">⏳</div>
            <div class="text"><div class="title" id="alert-title">載入中...</div></div>
        </div>
        
        <div class="card">
            <h2>📍 水林鄉即時天氣 <span class="sub">（CWA）</span></h2>
            <div class="today-grid">
                <div class="today-item"><div class="icon">🌡️</div><div class="label">溫度</div><div class="value" id="t-temp">--°C</div></div>
                <div class="today-item"><div class="icon">🌧️</div><div class="label">降雨</div><div class="value" id="t-rain">--</div></div>
                <div class="today-item"><div class="icon">💧</div><div class="label">濕度</div><div class="value" id="t-humid">--%</div></div>
                <div class="today-item"><div class="icon">🌬️</div><div class="label">風速</div><div class="value" id="t-wind">-- m/s</div></div>
            </div>
            <div class="rain-box" id="rain-box" style="display:none">
                <h4>🌧️ 18小時降雨預報（CWA）</h4>
                <div id="rain-list"></div>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>📈 每小時預報（Open-Meteo）</h3>
            <canvas id="hourlyChart" height="200"></canvas>
        </div>
        
        <div class="section-title">
            <span>📅 CWA 18小時預報</span>
            <span class="badge">每12小時</span>
        </div>
        <div id="cwa-forecast"></div>
        
        <div class="section-title">📅 Open-Meteo 7天預報（早/中/晚）</div>
        <div id="om-forecast"></div>
        
        <div class="card">
            <h3>🌱 農務建議</h3>
            <div id="tips-container"></div>
        </div>
        
        <div class="footer">氣象資料：CWA中央氣象局 + Open-Meteo｜本頁面每6小時自動更新</div>
    </div>
    
    <script>
    let chart = null;
    const WX_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'🌨️',80:'🌧️',81:'🌧️',82:'🌧️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const WX_DESC = {0:'晴天',1:'晴時多雲',2:'多雲',3:'陰天',45:'有霧',48:'有霧',51:'局部陣雨',53:'局部陣雨',55:'陣雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'局部陣雨',81:'陣雨',82:'強陣雨',85:'小陣雪',86:'大陣雪',95:'雷雨',96:'雷雨',99:'雷雨'};
    const DAY = ['週日','週一','週二','週三','週四','週五','週六'];
    const MONTH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const CWA_API = 'CWA_API_KEY_REDACTED';
    
    function fmtTime(t) {
        if (!t) return '--:--';
        if (t.includes('T')) return t.split('T')[1].slice(0,5);
        return t.split(' ')[1]?.slice(0,5) || '--:--';
    }
    
    function windLevel(ws) {
        if (ws >= 30) return { text: '強', cls: 'high' };
        if (ws >= 15) return { text: '中', cls: 'med' };
        if (ws > 5) return { text: '輕', cls: 'low' };
        return { text: '微', cls: 'none' };
    }
    
    function rainLevel(pv) {
        if (pv >= 60) return { text: '高', cls: 'high' };
        if (pv >= 30) return { text: '中', cls: 'med' };
        if (pv > 10) return { text: '低', cls: 'low' };
        return { text: '無', cls: 'none' };
    }
    
    async function load() {
        try {
            const [obsRes, fcRes, omRes] = await Promise.all([
                fetch('https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0001-001?Authorization=' + CWA_API + '&limit=200'),
                fetch('https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=' + CWA_API),
                fetch('https://api.open-meteo.com/v1/forecast?latitude=23.71&longitude=120.29&hourly=weathercode,temperature_2m,precipitation_probability,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Taipei&forecast_days=7')
            ]);
            
            const obs = await obsRes.json();
            const fc = await fcRes.json();
            const om = await omRes.json();
            
            // CWA current
            const st = (obs.records.Station||[]).find(s=>s.StationName.includes('水林')||s.StationName.includes('虎尾')||s.StationName.includes('斗六'))||{};
            document.getElementById('t-temp').textContent = (st.WeatherElement?.AirTemperature||'--') + '°C';
            document.getElementById('t-humid').textContent = (st.WeatherElement?.RelativeHumidity||'--') + '%';
            document.getElementById('t-wind').textContent = (st.WeatherElement?.WindSpeed||'--') + ' m/s';
            document.getElementById('update-time').textContent = new Date().toLocaleString('zh-TW');
            
            // CWA forecast
            const loc = fc.records.location.find(l=>l.locationName.includes('雲林'));
            const el={}; loc.weatherElement.forEach(e=>el[e.elementName]=e.time);
            
            const pop0 = parseInt(el.PoP[0]?.parameter?.parameterName)||0;
            const rl0 = rainLevel(pop0);
            document.getElementById('t-rain').textContent = rl0.text;
            document.getElementById('t-rain').className = 'value ' + (rl0.cls==='high'?'danger':rl0.cls==='med'?'warning':'safe');
            
            // Alert
            const alertBox=document.getElementById('alert-box'), alertIcon=document.getElementById('alert-icon'), alertTitle=document.getElementById('alert-title');
            if(pop0>=70) { alertBox.className='alert danger'; alertIcon.textContent='🚫'; alertTitle.textContent='🚫 高降雨機率'; }
            else if(pop0>=40) { alertBox.className='alert warning'; alertIcon.textContent='⚠️'; alertTitle.textContent='⚠️ 局部陣雨'; }
            else { alertBox.className='alert safe'; alertIcon.textContent='✅'; alertTitle.textContent='✅ 天氣穩定'; }
            
            // Rain list (6 x 3hr)
            let rainHtml='', hasRain=false;
            for(let i=0;i<3;i++) {
                const wx=el.Wx[i], pop=el.PoP[i];
                const pv=parseInt(pop?.parameter?.parameterName)||0;
                const desc=wx?.parameter?.parameterName||'';
                const start=fmtTime(wx?.startTime);
                const end=fmtTime(wx?.endTime);
                if(pv>0 || desc.includes('雨')) {
                    hasRain=true;
                    const rl=rainLevel(pv);
                    rainHtml+=`<div class="rain-row"><span class="time">${start}-${end}</span><span class="desc">${desc}</span><span class="level ${rl.cls}">${rl.text === '高' ? '🌧️🌧️' : rl.text === '中' ? '🌧️' : rl.text === '低' ? '🌦️' : '☀️'}${rl.text}</span></div>`;
                }
            }
            document.getElementById('rain-box').style.display = hasRain?'block':'none';
            document.getElementById('rain-list').innerHTML = rainHtml || '<div class="rain-row"><span class="desc">目前無明顯降雨</span></div>';
            
            // Open-Meteo data
            const omTimes = om.hourly.time;
            const omWx = om.hourly.weathercode;
            const omTemp = om.hourly.temperature_2m;
            const omPop = om.hourly.precipitation_probability;
            const omWind = om.hourly.windspeed_10m;
            
            // CWA 18hr forecast with wind
            let cwaHtml='';
            for(let i=0;i<3;i++) {
                const wx=el.Wx[i]||el.Wx[0];
                const pop=el.PoP[i]||el.PoP[0];
                const minT=el.MinT[i]||el.MinT[0];
                const maxT=el.MaxT[i]||el.MaxT[0];
                const pv=parseInt(pop?.parameter?.parameterName)||0;
                const desc=wx?.parameter?.parameterName||'';
                const icon=WX_ICON[parseInt(wx?.parameter?.parameterValue)]||'🌤️';
                const rl=rainLevel(pv);
                const start=fmtTime(wx?.startTime);
                
                // Match wind from Open-Meteo
                let windSpeed = '--';
                const cwaTime = new Date(wx?.startTime);
                for(let j=0; j<omTimes.length && j<48; j++) {
                    const omDateStr = omTimes[j].includes('T') ? omTimes[j] : omTimes[j].replace(' ', 'T');
                    const omT = new Date(omDateStr);
                    if(Math.abs(omT - cwaTime) < 3*60*60*1000) {
                        windSpeed = omWind[j]?.toFixed(0) || '--';
                        break;
                    }
                }
                const wl = windLevel(parseFloat(windSpeed)||0);
                cwaHtml+=`<div class="day-card"><div class="period-row"><span class="period">${start}</span><span class="wx">${icon}</span><span class="desc">${desc} ${minT?.parameter?.parameterName}~${maxT?.parameter?.parameterName}°C</span><span class="level ${rl.cls}">${rl.text === '高' ? '🌧️🌧️' : rl.text === '中' ? '🌧️' : rl.text === '低' ? '🌦️' : '☀️'}${rl.text}</span><span class="wind ${wl.cls}">🌬️${windSpeed}km/h</span></div></div>`;
            }
            document.getElementById('cwa-forecast').innerHTML=cwaHtml;
            
            // Hourly chart (next 24 hours from now)
            const now = new Date();
            const labels = [], temps = [], pops = [];
            for(let i=0; i<Math.min(48, omTimes.length); i++) {
                const omDate = new Date(omTimes[i].includes('T') ? omTimes[i] : omTimes[i].replace(' ', 'T'));
                if(omDate >= now) {
                    labels.push(fmtTime(omTimes[i]));
                    temps.push(omTemp[i]);
                    pops.push(omPop[i]||0);
                    if(labels.length >= 24) break;
                }
            }
            
            if(chart) chart.destroy();
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [
                    { label: '溫度 (°C)', data: temps, borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.1)', yAxisID: 'yTemp', tension: 0.3, fill: true },
                    { label: '降雨機率 (%)', data: pops, borderColor: '#3498db', backgroundColor: 'rgba(52,152,219,0.3)', yAxisID: 'yPop', tension: 0.3, fill: true }
                ]},
                options: { responsive: true, interaction: { mode: 'index', intersect: false }, plugins: { legend: { position: 'top' } }, scales: { yTemp: { type: 'linear', position: 'left', title: { display: true, text: '°C' }, grid: { drawOnChartArea: false } }, yPop: { type: 'linear', position: 'right', min: 0, max: 100, title: { display: true, text: '%' } } } }
            });
            
            // Open-Meteo 7-day x 3 periods
            let omHtml='';
            const dailyData = {};
            for(let i=0; i<omTimes.length; i++) {
                const t=omTimes[i];
                const day=t.includes('T')?t.split('T')[0]:t.split(' ')[0];
                const hour=parseInt(t.includes('T')?t.split('T')[1].slice(0,2):t.split(' ')[1]?.slice(0,2));
                if(!dailyData[day]) dailyData[day]={早:[],中:[],晚:[]};
                if(hour>=6 && hour<12) dailyData[day].早.push(i);
                else if(hour>=12 && hour<18) dailyData[day].中.push(i);
                else dailyData[day].晚.push(i);
            }
            
            Object.keys(dailyData).slice(0,7).forEach(day => {
                const d=new Date(day);
                const dayIdx=om.daily.time.indexOf(day);
                const maxT=om.daily.temperature_2m_max[dayIdx];
                const minT=om.daily.temperature_2m_min[dayIdx];
                const noonIdx=dailyData[day].中[Math.floor(dailyData[day].中.length/2)]||dailyData[day].早[0]||0;
                const dayWx=omWx[noonIdx]||0;
                
                omHtml+=`<div class="day-card"><div class="day-header"><div class="date">${MONTH[d.getMonth()]}${d.getDate()}日<div class="day">${DAY[d.getDay()]}</div></div><div class="wx-icon">${WX_ICON[dayWx]||'🌤️'}</div><div class="wx-desc">${WX_DESC[dayWx]||'未知'}</div><div class="temps"><div class="high">${maxT?.toFixed(0)}°</div><div class="low">${minT?.toFixed(0)}°</div></div></div>`;
                
                ['早','中','晚'].forEach((p,i) => {
                    const idxs=dailyData[day][p];
                    if(idxs.length>0) {
                        const idx=idxs[Math.floor(idxs.length/2)];
                        const rl=rainLevel(omPop[idx]||0);
                        const icons=WX_ICON[omWx[idx]]||'🌤️';
                        const lbl=p==='早'?'🌅 早晨':p==='中'?'☀️ 下午':'🌙 夜間';
                        omHtml+=`<div class="period-row"><span class="period">${lbl}</span><span class="wx">${icons}</span><span class="desc">${omTemp[idx]?.toFixed(0)}°C</span><span class="level ${rl.cls}">${rl.text === '高' ? '🌧️🌧️' : rl.text === '中' ? '🌧️' : rl.text === '低' ? '🌦️' : '☀️'}${rl.text}</span></div>`;
                    }
                });
                omHtml+='</div>';
            });
            document.getElementById('om-forecast').innerHTML=omHtml;
            
            // Tips
            const avgPop=om.daily.precipitation_probability_max.reduce((s,p)=>s+(p||0),0)/7;
            const avgMin=om.daily.temperature_2m_min.reduce((s,p)=>s+(p||0),0)/7;
            let tips='';
            if(avgMin>=28) tips+=`<div class="tip-item"><div class="tip-icon">🌡️</div><div class="tip-text"><div class="title">溫度偏高（均溫${avgMin.toFixed(1)}°C）</div><div class="desc">建議清晨或傍晚農務</div></div></div>`;
            else if(avgMin<15) tips+=`<div class="tip-item"><div class="tip-icon">🌡️</div><div class="tip-text"><div class="title">溫度偏低（均溫${avgMin.toFixed(1)}°C）</div><div class="desc">注意作物保暖</div></div></div>`;
            if(avgPop>=60) tips+=`<div class="tip-item"><div class="tip-icon">🌧️</div><div class="tip-text"><div class="title">本週降雨頻繁</div><div class="desc">提前做好排水，疫病風險高</div></div></div>`;
            else if(avgPop>=30) tips+=`<div class="tip-item"><div class="tip-icon">🌧️</div><div class="tip-text"><div class="title">本週偶有陣雨</div><div class="desc">噴藥前確認未來3小時不會下雨</div></div></div>`;
            else tips+=`<div class="tip-item"><div class="tip-icon">☀️</div><div class="tip-text"><div class="title">本週降雨少</div><div class="desc">加強灌溉</div></div></div>`;
            tips+=`<div class="tip-item"><div class="tip-icon">🌱</div><div class="tip-text"><div class="title">病蟲害防治</div><div class="desc">潮濕防疫病，乾燥防紅蜘蛛</div></div></div>`;
            tips+=`<div class="tip-item"><div class="tip-icon">🛡️</div><div class="tip-text"><div class="title">葉面施肥</div><div class="desc">選清晨或傍晚，雨後待葉面乾燥</div></div></div>`;
            document.getElementById('tips-container').innerHTML=tips;
            
        } catch(e) { console.error(e); alert('載入失敗: '+e.message); }
    }
    load();
    </script>
</body>
</html>
